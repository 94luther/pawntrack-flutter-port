name: pawntrack_flutter
description: Flutter web and mobile port of the PawnTrack dashboard.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0
  firebase_core: ^4.3.0
  file_picker: ^8.3.7
  http: ^1.2.2
  intl: ^0.19.0
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  firebase_auth: ^6.5.2
  firebase_ai: ^3.12.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
